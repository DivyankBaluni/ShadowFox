<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your personal wishlist on TechNova. Save your favorite premium electronics.">
  <title>Wishlist — TechNova</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/wishlist.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar-inner">
        <a href="index.html" class="logo">
          <img src="assets/logo-light.png" class="logo-light" alt="TechNova" />
          <img src="assets/logo-dark.png" class="logo-dark" alt="TechNova" />
        </a>
        <nav class="nav-links" aria-label="Site links">
          <a href="index.html" class="active">Home</a>
          <a href="products.html">Products</a>
          <a href="products.html?category=Laptops">Laptops</a>
          <a href="products.html?category=Smartphones">Phones</a>
          <a href="products.html?category=Audio">Audio</a>
        </nav>
        <form class="search-bar" id="searchForm" role="search">
          <span class="search-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </span>
          <input
            type="search"
            id="searchInput"
            placeholder="Search products, brands…"
            aria-label="Search"
            autocomplete="off"
          />
          <div
            class="search-results-dropdown"
            id="searchDropdown"
            role="listbox"
          ></div>
        </form>
        <div class="nav-actions">
          <button
            class="nav-icon-btn nav-btn"
            id="themeToggle"
            aria-label="Toggle theme"
          >
            <svg
              class="theme-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <!-- Sun -->
              <circle class="sun-core" cx="12" cy="12" r="5" />

              <g class="sun-rays">
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </g>

              <!-- Moon -->
              <path
                class="moon-shape"
                d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
              />
            </svg>
          </button>
          <a
            href="wishlist.html"
            class="nav-btn"
            aria-label="Wishlist"
            title="Wishlist"
            ><button class="nav-btn" aria-label="Wishlist">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
            </button>
            <span
              class="wishlist-badge"
              id="wishlistBadge"
              aria-live="polite"
            ></span>
          </a>
          <a href="cart.html" class="nav-btn" aria-label="Shopping cart"
            ><button class="nav-btn" aria-label="Wishlist">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                />
              </svg>
            </button>
            <span class="cart-badge" id="cartBadge" aria-live="polite"></span>
          </a>
          <button class="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </nav>
<nav class="mobile-nav" id="mobileNav">
  <a href="index.html">🏠 Home</a>
  <a href="products.html">📦 All Products</a>
  <a href="cart.html">🛒 Cart</a>
  <a href="wishlist.html" class="active">❤️ Wishlist</a>
</nav>

<div class="container">
  <div class="wishlist-header">
    <nav style="font-size:13px;color:var(--color-text-muted);display:flex;gap:8px;margin-bottom:8px" aria-label="Breadcrumb">
      <a href="index.html" style="transition:color 0.2s" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color=''">Home</a>
      <span>/</span>
      <span>Wishlist</span>
    </nav>
    <h1>Your Wishlist</h1>
    <p class="wishlist-count-label" id="wishlistCountLabel">0 items</p>
  </div>

  <main>
    <!-- Wishlist items will render in a products grid -->
    <div class="products-grid products-grid--4col" id="wishlistGrid" aria-label="Wishlist items" aria-live="polite">
      <!-- Loaded by JS -->
    </div>
  </main>
</div>

<!-- Footer -->
<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer-bottom" style="border-top:none;margin-top:0;padding-top:0">
      <span>© 2026 TechNova. All rights reserved.</span>
      <a href="index.html" style="color:var(--color-primary)">← Back to Home</a>
    </div>
  </div>
</footer>

<!-- QUICK VIEW MODAL -->
<div class="modal-overlay" id="quickViewModal" role="dialog" aria-modal="true" aria-labelledby="quickViewTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="quickViewTitle">Quick View</h2>
      <button class="modal-close" id="closeQuickView" aria-label="Close quick view">✕</button>
    </div>
    <div id="quickViewBody"><!-- filled by JS --></div>
  </div>
</div>

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="compareModal" role="dialog" aria-modal="true" aria-labelledby="compareTitle">
  <div class="modal" style="max-width:900px">
    <div class="modal-header">
      <h2 class="modal-title" id="compareTitle">Compare Products</h2>
      <button class="modal-close" id="closeCompare" aria-label="Close compare">✕</button>
    </div>
    <div id="compareBody" style="padding:var(--spacing-lg)"><!-- filled by JS --></div>
  </div>
</div>

<!-- COMPARE BAR -->
<div class="compare-bar" id="compareBar" role="complementary" aria-label="Compare products">
  <span style="font-size:13px;font-weight:600;white-space:nowrap">Compare:</span>
  <div class="compare-bar-items" id="compareSlots"></div>
  <button class="btn btn-primary btn-sm" id="compareNowBtn">Compare Now</button>
  <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.compare-btn-card').forEach(b=>b.click()&&false);compareList=[];updateCompareBar()">Clear</button>
</div>

<button class="back-to-top" aria-label="Back to top">↑</button>
<div class="toast-container" aria-live="polite"></div>

<script src="js/data/products.js"></script>
<script src="js/utils/storage.js"></script>
<script src="js/utils/helpers.js"></script>
<script src="js/utils/toast.js"></script>
<script src="js/components/cart.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/components/filters.js"></script>
<script src="js/components/wishlist.js"></script>
<script src="js/main.js"></script>
</body>
</html>
